<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps — Fleet Control</title>
<style>
  :root{
    --bg:#0B1220;
    --panel:#131B2E;
    --panel-2:#1A2438;
    --border:#25314A;
    --amber:#F5A623;
    --green:#2ECC71;
    --blue:#4A9EFF;
    --red:#E5484D;
    --text:#E8ECF4;
    --text-dim:#8592AD;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); min-height:100vh;
  }
  ::selection{background:var(--amber); color:#0B1220;}

  /* ---------- Login ---------- */
  #loginScreen{
    display:flex; align-items:center; justify-content:center;
    height:100vh; flex-direction:column; gap:24px;
  }
  .login-box{
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:40px; width:360px;
  }
  .login-box h1{
    font-size:22px; letter-spacing:0.5px; margin:0 0 4px;
    text-transform:uppercase; font-weight:700;
  }
  .login-box .sub{color:var(--text-dim); font-size:13px; margin-bottom:24px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:11px; text-transform:uppercase;
    letter-spacing:0.8px; color:var(--text-dim); margin-bottom:6px;
  }
  input, select{
    width:100%; padding:10px 12px; background:var(--panel-2);
    border:1px solid var(--border); border-radius:6px; color:var(--text);
    font-size:14px; font-family:var(--sans);
  }
  input:focus, select:focus{outline:2px solid var(--amber); outline-offset:1px;}
  input[data-mono]{font-family:var(--mono);}
  .btn{
    background:var(--amber); color:#1a1200; border:none; border-radius:6px;
    padding:11px 18px; font-weight:700; font-size:13px; cursor:pointer;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .btn:hover{background:#ffb638;}
  .btn:focus-visible{outline:2px solid #fff; outline-offset:2px;}
  .btn.secondary{background:transparent; color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:var(--red); color:#fff;}
  .btn:disabled{opacity:0.4; cursor:not-allowed;}
  .btn-row{display:flex; gap:8px; margin-top:8px;}
  .err{color:var(--red); font-size:13px; margin-top:10px; min-height:16px;}
  .toggle-link{text-align:center; margin-top:16px; font-size:13px; color:var(--text-dim);}
  .toggle-link a{color:var(--amber); cursor:pointer; text-decoration:none;}

  /* ---------- App shell ---------- */
  #app{display:none; height:100vh;}
  .shell{display:flex; height:100%;}
  .sidebar{
    width:220px; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:20px 0; flex-shrink:0;
  }
  .brand{
    padding:0 20px 20px; font-weight:800; font-size:16px;
    letter-spacing:0.5px; text-transform:uppercase; border-bottom:1px solid var(--border);
    margin-bottom:12px;
  }
  .brand span{color:var(--amber);}
  .nav-item{
    padding:11px 20px; color:var(--text-dim); cursor:pointer; font-size:13px;
    font-weight:600; letter-spacing:0.3px; border-left:3px solid transparent;
    display:flex; align-items:center; gap:10px;
  }
  .nav-item:hover{color:var(--text); background:var(--panel-2);}
  .nav-item.active{color:var(--amber); border-left-color:var(--amber); background:var(--panel-2);}
  .nav-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}
  .sidebar-footer{
    margin-top:auto; padding:16px 20px; border-top:1px solid var(--border);
    font-size:12px; color:var(--text-dim);
  }
  .sidebar-footer .role{color:var(--amber); font-weight:700; text-transform:capitalize;}
  .sidebar-footer button{
    margin-top:10px; width:100%; background:transparent; border:1px solid var(--border);
    color:var(--text-dim); padding:8px; border-radius:6px; cursor:pointer; font-size:12px;
  }

  .main{flex:1; overflow-y:auto; padding:28px 32px;}
  .page-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .page-header h2{margin:0; font-size:20px; letter-spacing:0.3px;}
  .page-header .sub{color:var(--text-dim); font-size:13px; margin-top:2px;}

  /* ---------- Fleet status rail (signature element) ---------- */
  .rail-wrap{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:16px 20px; margin-bottom:24px;
  }
  .rail-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim);
    margin-bottom:10px; display:flex; justify-content:space-between;
  }
  .rail{display:flex; gap:3px; flex-wrap:wrap;}
  .rail-seg{width:14px; height:28px; border-radius:2px; cursor:default; flex-shrink:0; transition:transform 0.1s;}
  .rail-seg:hover{transform:scaleY(1.15);}
  .rail-seg.available{background:var(--green);}
  .rail-seg.on_trip{background:var(--blue);}
  .rail-seg.in_shop{background:var(--amber);}
  .rail-seg.retired{background:var(--red); opacity:0.5;}
  .rail-legend{display:flex; gap:16px; margin-top:12px; font-size:11px; color:var(--text-dim);}
  .rail-legend span{display:flex; align-items:center; gap:5px;}
  .legend-dot{width:8px; height:8px; border-radius:2px;}

  /* ---------- KPI grid ---------- */
  .kpi-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:14px; margin-bottom:24px;}
  .kpi-card{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px 18px;}
  .kpi-card .val{font-size:26px; font-weight:800; font-family:var(--mono);}
  .kpi-card .label{font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); margin-top:4px;}

  /* ---------- Tables ---------- */
  .panel{background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:24px;}
  .panel-header{padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
  .panel-header h3{margin:0; font-size:14px; text-transform:uppercase; letter-spacing:0.5px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; padding:10px 18px; color:var(--text-dim); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border);}
  td{padding:11px 18px; border-bottom:1px solid var(--border); font-family:var(--mono);}
  td.sans{font-family:var(--sans);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--panel-2);}
  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; font-family:var(--sans);}
  .badge.available{background:rgba(46,204,113,0.15); color:var(--green);}
  .badge.on_trip{background:rgba(74,159,255,0.15); color:var(--blue);}
  .badge.in_shop{background:rgba(245,166,35,0.15); color:var(--amber);}
  .badge.retired, .badge.suspended{background:rgba(229,72,77,0.15); color:var(--red);}
  .badge.draft{background:rgba(133,146,173,0.15); color:var(--text-dim);}
  .badge.dispatched{background:rgba(74,159,255,0.15); color:var(--blue);}
  .badge.completed{background:rgba(46,204,113,0.15); color:var(--green);}
  .badge.cancelled{background:rgba(229,72,77,0.15); color:var(--red);}
  .row-actions{display:flex; gap:6px;}
  .row-actions button{background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer; font-family:var(--sans);}
  .row-actions button:hover{border-color:var(--amber); color:var(--amber);}
  .row-actions button.danger:hover{border-color:var(--red); color:var(--red);}
  .empty-state{padding:40px 18px; text-align:center; color:var(--text-dim); font-size:13px;}

  /* ---------- Forms ---------- */
  .form-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:14px; padding:18px;}
  .form-actions{padding:0 18px 18px;}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; bottom:24px; right:24px; background:var(--panel);
    border:1px solid var(--border); border-left:3px solid var(--green);
    border-radius:8px; padding:12px 18px; font-size:13px; max-width:340px;
    display:none; z-index:1000;
  }
  #toast.error{border-left-color:var(--red);}

  .tabs{display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--border);}
  .tab{padding:9px 16px; font-size:13px; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; font-weight:600;}
  .tab.active{color:var(--amber); border-bottom-color:var(--amber);}

  @media (max-width: 720px){
    .sidebar{width:64px;}
    .sidebar .nav-item span.label, .brand span.full{display:none;}
    .main{padding:18px;}
  }

  /* ---------- AI Command Center ---------- */
  .ai-hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--panel),#17233d);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
  .ai-hero:after{content:"";position:absolute;width:220px;height:220px;border-radius:50%;right:-70px;top:-100px;background:radial-gradient(circle,rgba(74,158,255,.22),transparent 68%);animation:aiPulse 3s ease-in-out infinite}
  @keyframes aiPulse{50%{transform:scale(1.16);opacity:.55}}
  .ai-eyebrow{font:700 11px var(--mono);letter-spacing:1.4px;color:var(--blue);text-transform:uppercase}
  .ai-hero h2{font-size:25px;margin:8px 0 6px}
  .ai-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px;margin-bottom:20px}
  .ai-kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:17px;transition:.2s transform,.2s border-color}
  .ai-kpi:hover{transform:translateY(-3px);border-color:var(--blue)}
  .ai-kpi .num{font:800 27px var(--mono);margin:7px 0 2px}.ai-kpi .meta{font-size:11px;color:var(--text-dim)}
  .ai-layout{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
  .ai-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
  .ai-panel h3{margin:0 0 15px;font-size:14px}.ai-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ai-result{margin-top:14px;padding:14px;border:1px solid var(--border);border-radius:9px;background:var(--panel-2)}
  .score-ring{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) calc(var(--score)*1%),var(--border) 0);position:relative;flex-shrink:0}
  .score-ring:after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--panel-2)}
  .score-ring span{position:relative;z-index:1;font:800 17px var(--mono)}
  .recommend-row{display:flex;align-items:center;gap:14px}
  .anomaly{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}.anomaly:last-child{border:0}
  .severity{font:700 10px var(--mono);padding:4px 6px;border-radius:4px;height:max-content}.severity.HIGH,.severity.CRITICAL{background:rgba(229,72,77,.16);color:var(--red)}.severity.MEDIUM,.severity.WARNING{background:rgba(245,166,35,.16);color:var(--amber)}
  .copilot{margin-top:16px}.copilot-row{display:flex;gap:8px}.copilot-row input{flex:1}.copilot-answer{margin-top:10px;color:var(--text-dim);font-size:13px;line-height:1.55;min-height:20px}
  @media(max-width:900px){.ai-grid{grid-template-columns:1fr 1fr}.ai-layout{grid-template-columns:1fr}} @media(max-width:560px){.ai-grid,.ai-form-grid{grid-template-columns:1fr}}

</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>Transit<span style="color:var(--amber)">Ops</span></h1>
    <div class="sub" id="authSubtitle">Sign in to fleet control</div>

    <div id="loginFields">
      <div class="field"><label>Email</label><input id="loginEmail" type="email" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="loginPassword" type="password" autocomplete="current-password"></div>
    </div>

    <div id="signupFields" style="display:none;">
      <div class="field"><label>Name</label><input id="suName"></div>
      <div class="field"><label>Email</label><input id="suEmail" type="email"></div>
      <div class="field"><label>Password</label><input id="suPassword" type="password"></div>
      <div class="field">
        <label>Role</label>
        <select id="suRole">
          <option value="fleet_manager">Fleet Manager</option>
          <option value="driver_role">Driver</option>
          <option value="safety_officer">Safety Officer</option>
          <option value="financial_analyst">Financial Analyst</option>
        </select>
      </div>
    </div>

    <div class="btn-row"><button class="btn" id="authSubmitBtn" style="flex:1">Sign in</button></div>
    <div class="err" id="authErr"></div>
    <div class="toggle-link" id="authToggle">New here? <a onclick="toggleAuthMode()">Create an account</a></div>
  </div>
</div>

<div id="app">
  <div class="shell">
    <div class="sidebar">
      <div class="brand">Transit<span>Ops</span></div>
      <div class="nav-item active" data-page="dashboard"><span class="nav-dot"></span><span class="label">Dashboard</span></div>
      <div class="nav-item" data-page="vehicles"><span class="nav-dot"></span><span class="label">Vehicles</span></div>
      <div class="nav-item" data-page="drivers"><span class="nav-dot"></span><span class="label">Drivers</span></div>
      <div class="nav-item" data-page="trips"><span class="nav-dot"></span><span class="label">Trips</span></div>
      <div class="nav-item" data-page="maintenance"><span class="nav-dot"></span><span class="label">Maintenance</span></div>
      <div class="nav-item" data-page="fuel"><span class="nav-dot"></span><span class="label">Fuel &amp; Expenses</span></div>
      <div class="nav-item" data-page="ai"><span class="nav-dot"></span><span class="label">AI Command Center</span></div>
      <div class="nav-item" data-page="reports"><span class="nav-dot"></span><span class="label">Reports</span></div>
      <div class="sidebar-footer">
        Signed in as<br>
        <span class="role" id="userRoleLabel">—</span>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "http://127.0.0.1:8000";
let TOKEN = localStorage.getItem("transitops_token") || null;
let CURRENT_USER = null;
let isSignupMode = false;

function toast(msg, isError=false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isError ? "error" : "";
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.style.display="none", 3500);
}

async function api(path, options={}){
  const headers = options.headers || {};
  headers["Content-Type"] = "application/json";
  if (TOKEN) headers["Authorization"] = "Bearer " + TOKEN;
  const res = await fetch(API + path, {...options, headers});
  let data = null;
  try { data = await res.json(); } catch(e) {}
  if (!res.ok){
    let msg = "Request failed";
    if (data){
      if (data.detail && typeof data.detail === "string") msg = data.detail;
      else if (data.errors) msg = data.errors.map(e=>`${e.field}: ${e.message}`).join("; ");
      else if (data.detail) msg = JSON.stringify(data.detail);
    }
    throw new Error(msg);
  }
  return data;
}

function toggleAuthMode(){
  isSignupMode = !isSignupMode;
  document.getElementById("loginFields").style.display = isSignupMode ? "none" : "block";
  document.getElementById("signupFields").style.display = isSignupMode ? "block" : "none";
  document.getElementById("authSubtitle").textContent = isSignupMode ? "Create your fleet control account" : "Sign in to fleet control";
  document.getElementById("authSubmitBtn").textContent = isSignupMode ? "Create account" : "Sign in";
  document.getElementById("authToggle").innerHTML = isSignupMode
    ? 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>'
    : 'New here? <a onclick="toggleAuthMode()">Create an account</a>';
  document.getElementById("authErr").textContent = "";
}

document.getElementById("authSubmitBtn").addEventListener("click", async ()=>{
  const errEl = document.getElementById("authErr");
  errEl.textContent = "";
  try{
    if (isSignupMode){
      const name = document.getElementById("suName").value.trim();
      const email = document.getElementById("suEmail").value.trim();
      const password = document.getElementById("suPassword").value;
      const role = document.getElementById("suRole").value;
      if (!name || !email || !password) throw new Error("All fields are required");
      await api("/auth/signup", {method:"POST", body: JSON.stringify({name, email, password, role})});
      toast("Account created — signing you in");
      const loginRes = await api("/auth/login", {method:"POST", body: JSON.stringify({email, password})});
      TOKEN = loginRes.access_token;
      localStorage.setItem("transitops_token", TOKEN);
      await bootApp();
    } else {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!email || !password) throw new Error("Email and password are required");
      const loginRes = await api("/auth/login", {method:"POST", body: JSON.stringify({email, password})});
      TOKEN = loginRes.access_token;
      localStorage.setItem("transitops_token", TOKEN);
      await bootApp();
    }
  }catch(e){
    errEl.textContent = e.message;
  }
});

document.getElementById("logoutBtn").addEventListener("click", ()=>{
  TOKEN = null;
  localStorage.removeItem("transitops_token");
  document.getElementById("app").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
});

document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("click", ()=>{
    document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
    item.classList.add("active");
    renderPage(item.dataset.page);
  });
});

async function bootApp(){
  try{
    CURRENT_USER = await api("/auth/me");
  }catch(e){
    TOKEN = null;
    localStorage.removeItem("transitops_token");
    toast("Session expired, please sign in again", true);
    return;
  }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userRoleLabel").textContent = CURRENT_USER.role.replace("_", " ");
  renderPage("dashboard");
}
if (TOKEN) bootApp();

function badge(status){ return `<span class="badge ${status}">${status.replace("_"," ")}</span>`; }

async function renderPage(page){
  const main = document.getElementById("mainContent");
  main.innerHTML = `<div class="empty-state">Loading…</div>`;
  try{
    if (page === "dashboard") await pageDashboard(main);
    else if (page === "vehicles") await pageVehicles(main);
    else if (page === "drivers") await pageDrivers(main);
    else if (page === "trips") await pageTrips(main);
    else if (page === "maintenance") await pageMaintenance(main);
    else if (page === "fuel") await pageFuel(main);
    else if (page === "ai") await pageAI(main);
    else if (page === "reports") await pageReports(main);
  }catch(e){
    main.innerHTML = `<div class="empty-state">Couldn't load this page — ${e.message}</div>`;
  }
}


function animateNumber(el, target, suffix=""){
  const start = performance.now(), duration = 650;
  function tick(now){
    const p = Math.min((now-start)/duration,1);
    const value = target * (1-Math.pow(1-p,3));
    el.textContent = (Number.isInteger(target) ? Math.round(value) : value.toFixed(1)) + suffix;
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function pageAI(main){
  const [center, anomalies] = await Promise.all([
    api("/ai/command-center"),
    api("/ai/anomalies").catch(()=>[])
  ]);
  main.innerHTML = `
    <div class="ai-hero">
      <div class="ai-eyebrow">TransitOps Intelligence Layer · Live</div>
      <h2>AI Command Center</h2>
      <div class="sub">Decision support for dispatch, fleet health and operational anomalies.</div>
    </div>
    <div class="ai-grid">
      <div class="ai-kpi"><div class="meta">FLEET HEALTH</div><div class="num" data-ai-num="${center.fleet_health_avg}" data-suffix="/100">0</div><div class="meta">Average vehicle health</div></div>
      <div class="ai-kpi"><div class="meta">ACTIVE TRIPS</div><div class="num" data-ai-num="${center.active_trips}">0</div><div class="meta">Currently dispatched</div></div>
      <div class="ai-kpi"><div class="meta">CRITICAL RISKS</div><div class="num" data-ai-num="${center.critical_risk_vehicles}">0</div><div class="meta">Vehicles needing attention</div></div>
      <div class="ai-kpi"><div class="meta">FUEL ANOMALIES</div><div class="num" data-ai-num="${center.fuel_anomalies_count}">0</div><div class="meta">Efficiency drops detected</div></div>
    </div>
    <div class="ai-layout">
      <div>
        <div class="ai-panel">
          <h3>⚡ Smart Dispatch Recommendation</h3>
          <div class="ai-form-grid">
            <input id="aiSource" placeholder="Source" value="Bangalore">
            <input id="aiDestination" placeholder="Destination" value="Chennai">
            <input id="aiCargo" type="number" min="1" placeholder="Cargo weight (kg)">
            <input id="aiDistance" type="number" min="1" placeholder="Distance (km)">
          </div>
          <button class="btn" style="margin-top:12px" onclick="runAIRecommendation()">Analyze Fleet</button>
          <div id="aiDispatchResult"></div>
        </div>
        <div class="ai-panel copilot">
          <h3>✦ Operations Copilot</h3>
          <div class="copilot-row"><input id="copilotQuestion" placeholder="Ask about dispatch, health, maintenance or fuel risk…"><button class="btn" onclick="askCopilot()">Ask</button></div>
          <div class="copilot-answer" id="copilotAnswer">Ask a fleet operations question.</div>
        </div>
      </div>
      <div class="ai-panel">
        <h3>⚠ Anomaly Feed</h3>
        <div id="anomalyFeed">${anomalies.length ? anomalies.slice(0,8).map(a=>`
          <div class="anomaly"><span class="severity ${a.severity}">${a.severity}</span><div><b>${a.type.replaceAll("_"," ")}</b><div class="meta" style="margin-top:4px">${a.message}</div></div></div>`).join("") : '<div class="empty-state">No anomalies detected. Fleet signals look stable.</div>'}</div>
      </div>
    </div>`;

// Turns "registration_number" -> "Registration Number" for column headers
function humanizeKey(key){
  return key.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

// Formats a cell value: numbers with % suffix keys get a % sign, decimals rounded,
// status-like strings get badge styling, everything else printed plain.
function formatCell(key, value){
  if (value === null || value === undefined) return "—";
  if (typeof value === "number"){
    const rounded = Number.isInteger(value) ? value : Math.round(value * 100) / 100;
    if (/pct|percent/i.test(key)) return `${rounded}%`;
    if (/cost|amount|revenue/i.test(key)) return rounded.toLocaleString(undefined, {minimumFractionDigits: 0});
    return rounded;
  }
  if (typeof value === "string" && ["available","on_trip","in_shop","retired","suspended","draft","dispatched","completed","cancelled"].includes(value)){
    return badge(value);
  }
  return value;
}

// Renders any array-of-flat-objects report as a table, auto-deriving columns.
// Falls back to a readable message if the shape isn't a non-empty array.
function renderReportTable(data){
  if (!Array.isArray(data) || data.length === 0){
    return `<div class="empty-state">No data available yet — register vehicles and run trips to populate this report.</div>`;
  }
  const keys = Object.keys(data[0]);
  return `
    <table>
      <thead><tr>${keys.map(k => `<th>${humanizeKey(k)}</th>`).join("")}</tr></thead>
      <tbody>
        ${data.map(row => `
          <tr>${keys.map(k => `<td class="${typeof row[k] === 'string' && isNaN(row[k]) ? 'sans' : ''}">${formatCell(k, row[k])}</td>`).join("")}</tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
